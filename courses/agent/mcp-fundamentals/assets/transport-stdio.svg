<svg xmlns="http://www.w3.org/2000/svg" width="760" height="420" viewBox="0 0 760 420" role="img" aria-labelledby="title desc">
  <title id="title">stdio transport</title>
  <desc id="desc">The client launches a local MCP server subprocess and exchanges newline-delimited JSON-RPC messages over stdin and stdout.</desc>
  <rect width="760" height="420" fill="#fffefb"/>
  <text x="380" y="54" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="750" fill="#1d2422">stdio</text>
  <rect x="76" y="128" width="232" height="118" rx="8" fill="#e0f1ee" stroke="#0f766e" stroke-width="2"/>
  <rect x="452" y="128" width="232" height="118" rx="8" fill="#f8faf8" stroke="#bac8c2" stroke-width="2"/>
  <text x="192" y="180" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#0e4f49">MCP Client</text>
  <text x="568" y="180" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#1d2422">Local Server</text>
  <path d="M310 165 H440" stroke="#0f766e" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M450 210 H320" stroke="#315fa8" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <text x="380" y="142" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="16" fill="#0e4f49">stdin</text>
  <text x="380" y="238" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="16" fill="#315fa8">stdout</text>
  <text x="380" y="320" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="19" fill="#46514e">Best for local one-client subprocess integrations.</text>
  <text x="380" y="352" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" fill="#c97818">stdout must contain valid MCP messages only.</text>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto">
      <path d="M2 2 L11 6 L2 10 Z" fill="#0f766e"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto">
      <path d="M2 2 L11 6 L2 10 Z" fill="#315fa8"/>
    </marker>
  </defs>
</svg>
