interface:
  display_name: "LearnLoop"
  short_description: "Compile source-grounded material into local interactive learning packages"
  default_prompt: "Use the learnloop skill to create or improve a course. First define the learner job and Course Blueprint, research and verify high-stakes claims, choose justified Tutorial/Reference/Practice/Perspective forms, use semantic blocks for concepts, comparisons, evidence, practice, and judgment, then draft, self-review, validate, build, and optionally audit."
