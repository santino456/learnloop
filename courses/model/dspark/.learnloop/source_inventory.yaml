    notes: "Official MIT-licensed codebase for training and evaluating DSpark, DFlash, and Eagle3 draft models."

  - id: v4-pro-dspark-weights
    type: official
    title: "DeepSeek-V4-Pro-DSpark on HuggingFace"
    url: "https://huggingface.co/deepseek-ai/DeepSeek-V4-Pro-DSpark"
    status: read
    notes: "Production checkpoint combining DeepSeek-V4-Pro with DSpark draft module."

  - id: v4-flash-dspark-weights
    type: official
    title: "DeepSeek-V4-Flash-DSpark on HuggingFace"
    url: "https://huggingface.co/deepseek-ai/DeepSeek-V4-Flash-DSpark"
    status: read
    notes: "Production checkpoint combining DeepSeek-V4-Flash with DSpark draft module."

  - id: marktechpost-dspark
    type: article
    title: "DeepSeek Releases DSpark: Speculative Decoding Framework"
    url: "https://www.marktechpost.com/2026/06/27/deepseek-releases-dspark-a-speculative-decoding-framework-that-accelerates-deepseek-v4-per-user-generation-60-85-over-mtp-1/"
    status: read
    notes: "News coverage with training hardware requirements (8 GPU, ~38 TB target cache) and supported models."

  - id: eagle3-paper
    type: paper
    title: "EAGLE-3: Scaling up Inference Acceleration of Large Language Models via Training-Time Test"
    url: "https://arxiv.org/abs/2503.01840"
