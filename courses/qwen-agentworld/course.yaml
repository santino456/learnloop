id: qwen-agentworld
title: "Qwen-AgentWorld"
subtitle: "面向通用智能体的语言世界模型"
audience: "研究智能体世界模型、模拟与智能体 RL 的 AI 研究者与工程师"
default_port: 8787
template: tutorial
lang: zh
modules:
  - id: m1
    title: "基础 —— 为什么需要语言世界模型？"
    file: "modules/01.md"
    summary: "理解世界模型与策略模型的分工、Qwen-AgentWorld 的七大领域，以及 Decouple 与 Unify 两种范式。"
  - id: m2
    title: "统一环境轨迹模式"
    file: "modules/02.md"
    summary: "学习把七大领域表示为统一的 system prompt + (action, observation) 交替序列，并掌握 turn-level 展开与数据过滤。"
  - id: m3
    title: "三阶段训练配方"
    file: "modules/03.md"
    summary: "从 continual pre-training 到 SFT 再到 RL，掌握信息论 loss masking、拒绝采样、混合奖励与训练稳定性技巧。"
  - id: m4
    title: "AgentWorldBench —— 评估世界模型"
    file: "modules/04.md"
    summary: "学习构建五维 rubric、reference-grounded LLM judge、差异化匹配标准，并解读主实验结果。"
  - id: m5
    title: "应用一：把世界模型用作环境模拟器"
    file: "modules/05.md"
    summary: "学习零样本环境扩展、可控模拟、虚构世界构建，以及 Sim RL 与 Real RL 的取舍。"
  - id: m6
    title: "应用二：把世界模型用作智能体基础模型"
    file: "modules/06.md"
    summary: "学习 LWM RL warm-up、跨任务迁移、预测驱动的动作细化，以及它们如何提升下游智能体表现。"
  - id: m7
    title: "分析与推理模式（可选深入）"
    file: "modules/07.md"
    summary: "分析 LWM 的 chain-of-thought 推理模式、RL 训练动态，以及微观层面的保真度提升。"
