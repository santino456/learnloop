    notes: "Autoregressive speculative decoding baseline used in DSpark comparisons."

  - id: dflash-paper
    type: paper
    title: "DFlash: Block Diffusion for Flash Speculative Decoding"
    url: "https://arxiv.org/abs/2602.06036"
    status: read
    notes: "Parallel draft baseline using block diffusion; DSpark cites it as representative of parallel drafters."

  - id: mtp-paper
    type: paper
    title: "Better & Faster Large Language Models via Multi-Token Prediction"
    url: "https://arxiv.org/abs/2404.19737"
    status: read
    notes: "Foundational reference for Multi-Token Prediction (MTP), the production baseline DSpark improves upon."

