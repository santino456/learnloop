name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install -e .

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Check local install health
        run: python -m learnloop doctor courses

      - name: Validate sample course
        run: python -m learnloop validate courses/acp-fundamentals

      - name: Build sample course
        run: python -m learnloop build courses/acp-fundamentals

      - name: Audit sample course
        run: python -m learnloop audit courses/acp-fundamentals

      - name: Check CLI entrypoint
        run: learnloop templates courses/acp-fundamentals

  package:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          python -m pip install build
          python -m build

      - name: Smoke test wheel
        run: |
          python -m venv /tmp/learnloop-wheel
          /tmp/learnloop-wheel/bin/python -m pip install dist/*.whl
          /tmp/learnloop-wheel/bin/learnloop init demo --target /tmp/learnloop-courses
          /tmp/learnloop-wheel/bin/learnloop doctor /tmp/learnloop-courses
          /tmp/learnloop-wheel/bin/learnloop validate /tmp/learnloop-courses/demo
          /tmp/learnloop-wheel/bin/learnloop build /tmp/learnloop-courses/demo
          test -f /tmp/learnloop-courses/demo/dist/m1.html
