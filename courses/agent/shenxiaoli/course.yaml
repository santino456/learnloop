id: shenxiaoli
title: "深小理：全栈架构透视"
subtitle: "从一个 AI 辅助构建的全栈项目里，提取可传授的架构知识和判断力。适合回看复习，也适合作为技术分享素材。"
audience: "有基础 Web 开发经验的工程师或学生；对 AI Agent 架构感兴趣的技术人。"
default_port: 8787
template: tutorial
modules:
  - id: m1
    title: "项目总览：为什么这样搭"
    file: "modules/01.md"
    summary: "技术栈全景、全栈职责划分、裸机 vs Docker 取舍、AGENTS.md 作为项目契约。"
  - id: m2
    title: "Agent 大脑：ReAct 循环深度解析"
    file: "modules/02.md"
    summary: "LangGraph StateGraph 的 7 节点架构、条件路由、prepare→model→tools 循环、privacy 中断机制、loop_count 硬上限。"
  - id: m3
    title: "记忆的艺术：从会话到人格"
    file: "modules/03.md"
    summary: "session 记忆 vs 持久记忆、冷热分层（2h idle）、摘要压缩（240K token）、Dreaming 引擎双阶段自进化。"
    template: practice
  - id: m4
    title: "系统的骨骼：数据库、配置与安全"
    file: "modules/04.md"
    summary: "10 张表的 schema 总览、索引策略、quota 原子操作、config.py 设计思路、path traversal 防护、admin 继承隔离、速率限制。"
    template: reference
  - id: m5
    title: "会说话的前端：SSE 流式与交互设计"
    file: "modules/05.md"
    summary: "SSE 两阶段 pipeline、纯函数状态 reducer、断流恢复、RichContent Markdown-to-Block、UI 交互细节。"
    template: perspective
  - id: m6
    title: "工具生态：搜索、技能与人格系统"
    file: "modules/06.md"
    summary: "ToolRegistry 注册机制、BM25 中文搜索实现、Skill 加载流程、PersonalityLoader 缓存与截断。"
  - id: m7
    title: "部署与运维：从本机到线上"
    file: "modules/07.md"
    summary: "Nginx + systemd + OSS 架构、SSE 专用代理配置、OSS 防盗链、一键部署脚本、已知短板。"
  - id: m8
    title: "反思录：每一处技术取舍"
    file: "modules/08.md"
    summary: "全课程 Perspective 汇总——为什么不用 ORM、session lock 的边界、裸机部署的代价、冷热分层的未竟之路。"
    template: perspective
  - id: m9
    title: "技术栈速查"
    file: "modules/09.md"
    summary: "深小理涉及的前端、后端、Agent、数据库、LLM、对象存储和部署组件的快速参考。"
    template: reference
